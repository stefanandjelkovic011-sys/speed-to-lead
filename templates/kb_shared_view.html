<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Base — {{ business.name }}</title>
    <style>
        :root { --bg: #0f1117; --surface: #1a1d27; --border: #2e3345; --text: #e4e7ef; --text-dim: #8b92a8; --primary: #6366f1; --success: #22c55e; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); padding: 40px 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { font-size: 24px; margin-bottom: 8px; }
        .subtitle { color: var(--text-dim); font-size: 14px; margin-bottom: 30px; }
        .entry { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 15px; }
        .entry h3 { font-size: 16px; margin-bottom: 4px; }
        .category { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; text-transform: uppercase; background: #242836; color: var(--text-dim); margin-bottom: 10px; }
        .content { font-size: 14px; line-height: 1.6; color: var(--text-dim); white-space: pre-wrap; }
        .verify { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-top: 30px; }
        .verify label { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 14px; margin-bottom: 8px; }
        .verify input[type="checkbox"] { width: 18px; height: 18px; }
        .footer { text-align: center; color: var(--text-dim); font-size: 12px; margin-top: 40px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>{{ business.name }} — Knowledge Base</h1>
        <div class="subtitle">Shared view for review. {{ kbs|length }} entries.</div>

        {% for kb in kbs %}
        <div class="entry">
            <h3>{{ kb.name }}</h3>
            <span class="category">{{ kb.category }}</span>
            <div class="content">{{ kb.content }}</div>
        </div>
        {% endfor %}

        {% if not kbs %}
        <div class="entry" style="text-align:center;color:var(--text-dim);">
            <p>No active knowledge base entries.</p>
        </div>
        {% endif %}

        <div class="verify">
            <h3 style="margin-bottom:12px;">Reviewer Verification</h3>
            <label><input type="checkbox"> I have reviewed all service descriptions</label>
            <label><input type="checkbox"> I have verified pricing information</label>
            <label><input type="checkbox"> I have confirmed operating hours</label>
            <label><input type="checkbox"> I have reviewed FAQ answers</label>
            <label><input type="checkbox"> All information is accurate and up to date</label>
        </div>

        <div class="footer">
            Powered by Speed-to-Lead
        </div>
    </div>
</body>
</html>
